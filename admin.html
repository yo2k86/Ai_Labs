<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ailabs Admin - Control Panel</title>
    
    <!-- Import Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Import Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Import FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        darkbg: '#050505',
                        panelbg: '#121212',
                    },
                    animation: {
                        'pulse-slow': 'pulse 6s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050505; color: #fff; }
        .glass-card {
            background: rgba(30, 30, 30, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        /* Hide element helper */
        .hidden { display: none !important; }
    </style>
</head>
<body class="font-sans antialiased selection:bg-emerald-500 selection:text-white min-h-screen flex flex-col">

    <!-- Global Toast -->
    <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 glass-card px-4 py-2 rounded-full flex items-center gap-2 opacity-0 pointer-events-none transition-all duration-300 z-[9999] transform -translate-y-4">
        <i id="toast-icon" class="fas fa-info-circle text-emerald-400"></i>
        <span id="toast-message" class="text-xs sm:text-sm font-medium">Notifikasi</span>
    </div>

    <!-- VIEW 1: LOGIN ADMIN -->
    <div id="view-login" class="flex-1 flex flex-col items-center justify-center p-4">
        <div class="glass-card p-6 sm:p-8 rounded-2xl w-full max-w-sm text-center relative overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-br from-emerald-500/10 to-purple-500/10 z-0"></div>
            <div class="relative z-10">
                <div class="w-16 h-16 bg-black border border-emerald-500/30 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-[0_0_20px_rgba(16,185,129,0.2)]">
                    <i class="fa-solid fa-shield-halved text-emerald-400 text-3xl"></i>
                </div>
                <h1 class="text-xl sm:text-2xl font-bold mb-2">Ailabs Command</h1>
                <p class="text-xs text-gray-400 mb-6">Akses Terbatas. Masukkan sandi sistem.</p>
                
                <input type="password" id="login-code" class="w-full bg-black/60 border border-gray-700 focus:border-emerald-500 rounded-xl px-4 py-3 text-center text-white mb-4 outline-none transition-colors" placeholder="••••••••" onkeypress="if(event.key === 'Enter') checkLogin()">
                
                <button onclick="checkLogin()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl transition-all shadow-lg active:scale-95">
                    Otorisasi Akses
                </button>
            </div>
        </div>
    </div>

    <!-- VIEW 2: MAIN DASHBOARD -->
    <div id="view-main" class="hidden flex-col h-screen w-full">
        <!-- HEADER -->
        <header class="glass-card border-b border-white/5 px-4 sm:px-6 py-3 sm:py-4 flex justify-between items-center shrink-0 z-10 sticky top-0">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-server text-emerald-400 text-xl sm:text-2xl"></i>
                <div>
                    <h1 class="text-sm sm:text-lg font-bold leading-tight">Ailabs Core</h1>
                    <p class="text-[9px] sm:text-[10px] text-emerald-400 font-mono" id="app-id-display">AppID: 1:2902...d513</p>
                </div>
            </div>
            <div class="flex items-center gap-3 sm:gap-4">
                <div class="text-right hidden sm:block">
                    <p class="text-[10px] text-gray-400 uppercase tracking-wider">Kie.ai Balance</p>
                    <p class="text-sm font-bold text-yellow-400" id="kie-balance-text"><i class="fas fa-spinner fa-spin text-xs"></i></p>
                </div>
                <button onclick="logout()" class="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-red-500/20 text-red-400 hover:bg-red-500 hover:text-white flex items-center justify-center transition-colors">
                    <i class="fa-solid fa-power-off text-sm"></i>
                </button>
            </div>
        </header>

        <!-- NAVIGATION TABS -->
        <div class="flex px-2 sm:px-6 pt-4 gap-2 overflow-x-auto custom-scrollbar shrink-0">
            <button onclick="switchTab('users')" id="tab-btn-users" class="px-4 py-2 text-xs sm:text-sm font-bold rounded-t-xl bg-emerald-600 text-white transition-colors whitespace-nowrap"><i class="fa-solid fa-users mr-1.5"></i> Klien & Saldo</button>
            <button onclick="switchTab('history')" id="tab-btn-history" class="px-4 py-2 text-xs sm:text-sm font-bold rounded-t-xl bg-white/5 text-gray-400 hover:bg-white/10 transition-colors whitespace-nowrap"><i class="fa-solid fa-clock-rotate-left mr-1.5"></i> Riwayat Generate</button>
            <button onclick="switchTab('referral')" id="tab-btn-referral" class="px-4 py-2 text-xs sm:text-sm font-bold rounded-t-xl bg-white/5 text-gray-400 hover:bg-white/10 transition-colors whitespace-nowrap"><i class="fa-solid fa-tags mr-1.5"></i> Status VIP Code</button>
        </div>

        <!-- CONTENT AREA -->
        <main class="flex-1 overflow-hidden relative bg-panelbg border-t border-emerald-500/20">
            
            <!-- TAB: USERS -->
            <div id="tab-users" class="absolute inset-0 overflow-y-auto custom-scrollbar p-3 sm:p-6">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-4">
                    <h2 class="text-base sm:text-xl font-bold"><i class="fa-solid fa-users text-emerald-400 mr-2"></i>Database Klien</h2>
                    <div class="flex gap-2 w-full sm:w-auto">
                        <div class="relative flex-1 sm:w-64">
                            <i class="fa-solid fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-500 text-xs"></i>
                            <input type="text" id="search-users" onkeyup="filterTable('users-tbody', 'search-users')" class="w-full bg-black border border-gray-700 rounded-lg pl-8 pr-3 py-1.5 text-xs sm:text-sm text-white focus:border-emerald-500 outline-none" placeholder="Cari nama/email...">
                        </div>
                        <button onclick="loadUsers()" class="bg-white/10 hover:bg-white/20 p-1.5 sm:px-3 rounded-lg text-xs sm:text-sm transition-colors shrink-0"><i class="fa-solid fa-rotate-right"></i></button>
                    </div>
                </div>

                <div class="w-full overflow-x-auto rounded-xl border border-gray-800 bg-black">
                    <table class="w-full text-left border-collapse min-w-[600px]">
                        <thead>
                            <tr class="bg-gray-900/50 text-[10px] sm:text-xs text-gray-400 uppercase tracking-wider border-b border-gray-800">
                                <th class="p-3 font-medium">User Info</th>
                                <th class="p-3 font-medium text-center">Tipe</th>
                                <th class="p-3 font-medium text-center">Kredit ⚡</th>
                                <th class="p-3 font-medium text-center">Akses Video</th>
                                <th class="p-3 font-medium text-right">Aksi Topup</th>
                            </tr>
                        </thead>
                        <tbody id="users-tbody" class="text-xs sm:text-sm divide-y divide-gray-800">
                            <tr><td colspan="5" class="p-8 text-center text-gray-500"><i class="fas fa-spinner fa-spin text-2xl mb-2 block"></i> Memuat data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- TAB: HISTORY -->
            <div id="tab-history" class="hidden absolute inset-0 overflow-y-auto custom-scrollbar p-3 sm:p-6">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-4">
                    <h2 class="text-base sm:text-xl font-bold"><i class="fa-solid fa-clock-rotate-left text-cyan-400 mr-2"></i>Aktivitas Generate (50 Terakhir)</h2>
                    <div class="flex gap-2 w-full sm:w-auto">
                        <div class="relative flex-1 sm:w-64">
                            <i class="fa-solid fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-500 text-xs"></i>
                            <input type="text" id="search-history" onkeyup="filterTable('history-tbody', 'search-history')" class="w-full bg-black border border-gray-700 rounded-lg pl-8 pr-3 py-1.5 text-xs sm:text-sm text-white focus:border-cyan-500 outline-none" placeholder="Cari prompt/user...">
                        </div>
                        <button onclick="loadHistory()" class="bg-white/10 hover:bg-white/20 p-1.5 sm:px-3 rounded-lg text-xs sm:text-sm transition-colors shrink-0"><i class="fa-solid fa-rotate-right"></i></button>
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-3 sm:gap-4" id="history-cards-container">
                    <div class="text-center py-10 text-gray-500"><i class="fas fa-spinner fa-spin text-2xl mb-2 block"></i> Memuat data...</div>
                </div>
            </div>

            <!-- TAB: REFERRAL -->
            <div id="tab-referral" class="hidden absolute inset-0 overflow-y-auto custom-scrollbar p-3 sm:p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-base sm:text-xl font-bold"><i class="fa-solid fa-tags text-purple-400 mr-2"></i>Status Kode VIP</h2>
                    <button onclick="loadReferrals()" class="bg-white/10 hover:bg-white/20 p-1.5 sm:px-3 rounded-lg text-xs sm:text-sm transition-colors shrink-0"><i class="fa-solid fa-rotate-right"></i></button>
                </div>
                
                <div class="flex flex-wrap gap-4 mb-4 text-xs font-mono">
                    <div class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-emerald-500/20 border border-emerald-500 inline-block"></span> Tersedia</div>
                    <div class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-red-500/20 border border-red-500 inline-block"></span> Terpakai</div>
                </div>

                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-2 sm:gap-3" id="referral-grid">
                    <div class="col-span-full text-center py-10 text-gray-500"><i class="fas fa-spinner fa-spin text-2xl mb-2 block"></i> Memuat data...</div>
                </div>
            </div>

        </main>
    </div>

    <script>
        const APP_ID = '1:290208256362:web:b5022be8bd57311f9cd513';
        let adminCode = sessionStorage.getItem('ailabs_admin_code') || '';

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            document.getElementById('toast-message').innerText = msg;
            
            if(type === 'error') {
                icon.className = 'fas fa-exclamation-circle text-red-400';
                toast.style.border = '1px solid rgba(248, 113, 113, 0.3)';
            } else {
                icon.className = 'fas fa-check-circle text-emerald-400';
                toast.style.border = '1px solid rgba(16, 185, 129, 0.3)';
            }

            toast.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
            }, 3000);
        }

        function checkLogin() {
            const code = document.getElementById('login-code').value;
            if (code === 'admin123' || code === 'Kr333wol') {
                adminCode = code;
                sessionStorage.setItem('ailabs_admin_code', code);
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-main').classList.remove('hidden');
                document.getElementById('view-main').classList.add('flex');
                showToast('Login berhasil!');
                initDashboard();
            } else {
                showToast('Sandi Salah!', 'error');
            }
        }

        function logout() {
            adminCode = '';
            sessionStorage.removeItem('ailabs_admin_code');
            document.getElementById('view-main').classList.add('hidden');
            document.getElementById('view-main').classList.remove('flex');
            document.getElementById('view-login').classList.remove('hidden');
            document.getElementById('login-code').value = '';
        }

        if (adminCode === 'admin123' || adminCode === 'Kr333wol') {
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-main').classList.remove('hidden');
            document.getElementById('view-main').classList.add('flex');
            initDashboard();
        }

        function switchTab(tabId) {
            ['users', 'history', 'referral'].forEach(id => {
                const btn = document.getElementById(`tab-btn-${id}`);
                const content = document.getElementById(`tab-${id}`);
                
                let activeColor = id === 'users' ? 'bg-emerald-600' : (id === 'history' ? 'bg-cyan-600' : 'bg-purple-600');

                if (id === tabId) {
                    content.classList.remove('hidden');
                    btn.className = `px-4 py-2 text-xs sm:text-sm font-bold rounded-t-xl text-white transition-colors whitespace-nowrap ${activeColor}`;
                } else {
                    content.classList.add('hidden');
                    btn.className = `px-4 py-2 text-xs sm:text-sm font-bold rounded-t-xl bg-white/5 text-gray-400 hover:bg-white/10 transition-colors whitespace-nowrap`;
                }
            });

            if(tabId === 'users') loadUsers();
            if(tabId === 'history') loadHistory();
            if(tabId === 'referral') loadReferrals();
        }

        function initDashboard() {
            document.getElementById('app-id-display').innerText = `AppID: ${APP_ID.substring(0,6)}...${APP_ID.substring(APP_ID.length-4)}`;
            loadKieBalance();
            loadUsers();
        }

        async function loadKieBalance() {
            const balEl = document.getElementById('kie-balance-text');
            try {
                const res = await fetch('/api/kie-balance', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminCode })
                });
                const data = await res.json();
                if(data.success) {
                    balEl.innerText = `$${data.balance}`;
                } else {
                    balEl.innerText = 'Err';
                }
            } catch (e) { balEl.innerText = 'Err'; }
        }

        async function loadUsers() {
            const tbody = document.getElementById('users-tbody');
            tbody.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-gray-500"><i class="fas fa-spinner fa-spin text-2xl mb-2 block"></i> Syncing...</td></tr>';
            try {
                const res = await fetch('/api/get_users', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminCode, appId: APP_ID })
                });
                const data = await res.json();
                if(data.success) {
                    if(data.users.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" class="p-4 text-center text-gray-500 text-xs">Belum ada user.</td></tr>';
                        return;
                    }
                    tbody.innerHTML = data.users.map(u => `
                        <tr class="hover:bg-white/5 transition-colors border-b border-gray-800/50">
                            <td class="p-3">
                                <div class="font-bold text-white max-w-[120px] sm:max-w-[200px] truncate">${u.name}</div>
                                <div class="text-[10px] text-gray-500 font-mono truncate max-w-[120px] sm:max-w-[200px]">${u.email}</div>
                                <div class="text-[8px] text-gray-600 font-mono mt-0.5 truncate max-w-[100px] sm:max-w-xs" title="${u.uid}">${u.uid}</div>
                            </td>
                            <td class="p-3 text-center">
                                ${u.isAnon 
                                    ? '<span class="bg-gray-700/50 text-gray-300 px-2 py-0.5 rounded text-[9px] font-bold">ANONIM</span>' 
                                    : '<span class="bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded text-[9px] font-bold">GOOGLE</span>'}
                            </td>
                            <td class="p-3 text-center">
                                <span class="text-sm font-black ${u.credits > 0 ? 'text-yellow-400' : 'text-red-400'}">${u.credits}</span>
                            </td>
                            <td class="p-3 text-center">
                                <label class="relative inline-flex items-center cursor-pointer">
                                  <input type="checkbox" class="sr-only peer" ${u.videoAccess !== false ? 'checked' : ''} onchange="toggleAccess('${u.uid}', this.checked)">
                                  <div class="w-9 h-5 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-emerald-500"></div>
                                </label>
                            </td>
                            <td class="p-3 text-right">
                                <div class="flex items-center justify-end gap-1 sm:gap-2">
                                    <input type="number" id="topup-${u.uid}" class="w-16 bg-black border border-gray-700 rounded px-2 py-1 text-xs text-white focus:border-emerald-500 outline-none" placeholder="+Jml">
                                    <button onclick="topupUser('${u.uid}')" class="bg-emerald-600 hover:bg-emerald-500 text-white text-[10px] sm:text-xs px-2 sm:px-3 py-1 sm:py-1.5 rounded font-bold transition-colors">SET</button>
                                </div>
                            </td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-red-400 text-xs">${data.error}</td></tr>`;
                }
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-red-400 text-xs">Network Error</td></tr>`;
            }
        }

        async function topupUser(uid) {
            const input = document.getElementById(`topup-${uid}`);
            const amount = parseInt(input.value);
            if(isNaN(amount)) return showToast('Masukkan angka yang valid', 'error');
            
            try {
                const res = await fetch('/api/topup', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminCode, appId: APP_ID, targetUid: uid, amount })
                });
                const data = await res.json();
                if(data.success) { showToast('Topup sukses!'); input.value = ''; loadUsers(); }
                else { showToast(data.error, 'error'); }
            } catch (e) { showToast('Error eksekusi', 'error'); }
        }

        async function toggleAccess(uid, status) {
            try {
                const res = await fetch('/api/toggle_access', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminCode, appId: APP_ID, targetUid: uid, videoAccess: status })
                });
                const data = await res.json();
                if(data.success) showToast(status ? 'Akses Dibuka' : 'Akses Diblokir');
                else showToast(data.error, 'error');
            } catch (e) { showToast('Error eksekusi', 'error'); }
        }

        async function loadHistory() {
            const container = document.getElementById('history-cards-container');
            container.innerHTML = '<div class="text-center py-10 text-gray-500"><i class="fas fa-spinner fa-spin text-2xl mb-2 block"></i> Sinkronisasi Log...</div>';
            try {
                const res = await fetch('/api/history', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminCode, appId: APP_ID })
                });
                const data = await res.json();
                if(data.success) {
                    if(data.history.length === 0) {
                        container.innerHTML = '<div class="text-center py-10 text-gray-500 text-xs">Belum ada riwayat.</div>';
                        return;
                    }
                    container.innerHTML = data.history.map(h => {
                        let badgeColor = 'bg-gray-600';
                        if(h.status === 'SUCCESS' || h.status === 'COMPLETED') badgeColor = 'bg-emerald-500';
                        if(h.status === 'FAILED' || h.status === 'ERROR') badgeColor = 'bg-red-500';
                        
                        return `
                        <div class="bg-black/50 border border-gray-800 rounded-xl p-3 sm:p-4 hover:border-cyan-500/30 transition-colors history-item relative">
                            <div class="absolute top-3 right-3 flex items-center gap-2">
                                <span class="text-[9px] font-mono text-gray-500">${new Date(h.timestamp).toLocaleString('id-ID')}</span>
                            </div>
                            <div class="flex items-center gap-2 mb-2">
                                <div class="w-8 h-8 rounded-full bg-cyan-900/50 flex items-center justify-center border border-cyan-500/30 shrink-0">
                                    <i class="fa-solid fa-user text-cyan-400 text-xs"></i>
                                </div>
                                <div class="overflow-hidden">
                                    <p class="text-xs font-bold text-white truncate max-w-[150px] sm:max-w-[200px]">${h.userName}</p>
                                    <p class="text-[9px] text-gray-500 font-mono truncate max-w-[150px] sm:max-w-[200px]">${h.userEmail}</p>
                                </div>
                            </div>
                            
                            <div class="bg-gray-900/80 rounded-lg p-2.5 mb-3 border border-gray-800">
                                <p class="text-[10px] text-gray-400 mb-1 flex items-center gap-2">
                                    <span class="bg-blue-900/50 text-blue-300 px-1.5 py-0.5 rounded text-[8px] border border-blue-500/30">${h.type}</span>
                                    <span class="bg-purple-900/50 text-purple-300 px-1.5 py-0.5 rounded text-[8px] border border-purple-500/30">${h.engine}</span>
                                    <span class="${badgeColor} text-white px-1.5 py-0.5 rounded text-[8px] font-bold ml-auto">${h.status}</span>
                                </p>
                                <p class="text-xs text-gray-300 line-clamp-2 search-text leading-relaxed">"${h.prompt}"</p>
                            </div>
                            
                            <div class="flex justify-between items-end">
                                <div class="text-[9px] text-gray-600 font-mono" title="${h.taskId}">ID: ${h.taskId.substring(0, 8)}...</div>
                                <button id="btn-check-${h.taskId}" onclick="checkStatus('${h.taskId}', '${h.engine}', this)" class="px-3 py-1.5 rounded-lg sm:rounded-xl text-[10px] sm:text-xs font-bold flex items-center gap-1 sm:gap-2 bg-white/10 hover:bg-white/20 text-white transition-colors border border-white/5 w-24 sm:w-32 justify-center shrink-0">
                                    <i class="fa-solid fa-search"></i> Cek Hasil
                                </button>
                            </div>
                        </div>
                        `;
                    }).join('');
                } else {
                    container.innerHTML = `<div class="text-center py-10 text-red-400 text-xs">${data.error}</div>`;
                }
            } catch (e) {
                container.innerHTML = `<div class="text-center py-10 text-red-400 text-xs">Network Error</div>`;
            }
        }

        // ========================================================
        // PERBAIKAN LOGIKA PENGECEKAN STATUS & TEMPFILE DOWNLOAD
        // ========================================================
        async function checkStatus(taskId, engine, btnElement) {
            const originalHtml = btnElement.innerHTML;
            btnElement.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Cek...';
            btnElement.disabled = true;
            
            try {
                const res = await fetch(`/api/check?taskId=${taskId}&engine=${encodeURIComponent(engine)}`);
                const data = await res.json();
                
                const status = String(data.data?.successFlag ?? data.successFlag ?? data.data?.status ?? data.status ?? '').toUpperCase();
                
                if (status === 'FAIL' || status === 'ERROR' || status === '2' || status === '3' || status === 'FAILED') {
                    btnElement.innerHTML = '<i class="fas fa-times text-red-500"></i> Gagal';
                    btnElement.className = 'px-3 py-1.5 rounded-lg sm:rounded-xl text-[10px] sm:text-xs ml-auto font-bold flex items-center justify-center gap-1 sm:gap-2 w-24 sm:w-32 bg-red-900/50 border border-red-500/50 text-red-300';
                    showToast('Generasi gagal di server Kie.ai', 'error');
                    return;
                }

                // Ekstraksi URL Cerdas yang sama seperti di Dashboard Utama
                let mediaUrl = data.data?.resultUrl || 
                               (data.data?.resultUrls && data.data.resultUrls[0]) || 
                               (data.data?.response?.resultUrls && data.data.response.resultUrls[0]) || 
                               data.data?.response?.video_url || 
                               data.data?.video_url;

                if (!mediaUrl) {
                    let foundUrls = [];
                    JSON.stringify(data, (k, v) => { if(typeof v === 'string' && v.startsWith('http')) foundUrls.push(v); return v; });
                    const validUrls = foundUrls.filter(u => !u.includes('localhost') && !u.includes('w3.org'));
                    mediaUrl = validUrls.find(u => u.includes('tempfile')) || validUrls.find(u => u.match(/\.(mp4|webm|mov|png|jpg|jpeg)(\?.*)?$/i)) || validUrls[0];
                }

                // Tambahkan '100' sebagai status sukses (Kling AI)
                if (mediaUrl && (status === '1' || status === '100' || status === 'SUCCESS' || status === 'COMPLETED' || mediaUrl.includes('tempfile'))) {
                    
                    let finalUrl = mediaUrl;
                    
                    // Kalau linknya masih diblokir (tempfile), konversi dulu pakai backend kita
                    if (mediaUrl.includes('tempfile')) {
                        try {
                            const dlRes = await fetch('/api/download', { 
                                method: 'POST', 
                                headers: { 'Content-Type': 'application/json' }, 
                                body: JSON.stringify({ url: mediaUrl }) 
                            });
                            const dlData = await dlRes.json();
                            finalUrl = dlData.data || dlData.url || mediaUrl;
                        } catch(e) { 
                            console.warn("Gagal konversi tempfile di admin");
                        }
                    }

                    btnElement.innerHTML = '<i class="fa-solid fa-external-link-alt"></i> Lihat';
                    btnElement.className = 'px-3 py-1.5 rounded-lg sm:rounded-xl text-[10px] sm:text-xs ml-auto font-bold flex items-center justify-center gap-1 sm:gap-2 w-24 sm:w-32 bg-emerald-500 text-white hover:bg-emerald-600 transition';
                    btnElement.onclick = () => window.open(finalUrl, '_blank');
                    btnElement.disabled = false;
                    showToast('Hasil ditemukan!');
                } else {
                    btnElement.innerHTML = originalHtml;
                    btnElement.disabled = false;
                    showToast('Masih proses / Antri.', 'error');
                }
            } catch (e) {
                btnElement.innerHTML = originalHtml;
                btnElement.disabled = false;
                showToast('Gagal terhubung API.', 'error');
            }
        }

        function copyToClipboard(text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast('Teks disalin!');
        }

        function filterTable(tbodyId, inputId) {
            const filter = document.getElementById(inputId).value.toLowerCase();
            if (tbodyId === 'history-tbody') {
                const items = document.querySelectorAll('.history-item');
                items.forEach(item => {
                    const txt = item.innerText.toLowerCase();
                    item.style.display = txt.includes(filter) ? '' : 'none';
                });
            } else {
                const rows = document.getElementById(tbodyId).getElementsByTagName('tr');
                for (let row of rows) {
                    const txt = row.innerText.toLowerCase();
                    row.style.display = txt.includes(filter) ? '' : 'none';
                }
            }
        }

        async function loadReferrals() {
            const container = document.getElementById('referral-grid');
            container.innerHTML = '<div class="col-span-full text-center py-10 text-gray-500"><i class="fas fa-spinner fa-spin text-2xl mb-2 block"></i> Memuat Data...</div>';
            try {
                const res = await fetch('/api/get_referrals', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminCode, appId: APP_ID })
                });
                const data = await res.json();
                if(data.success) {
                    container.innerHTML = data.codes.map(c => {
                        if(c.used) {
                            return `
                            <div class="bg-red-900/20 border border-red-500/30 rounded-lg p-2 text-center relative overflow-hidden group cursor-pointer" onclick="copyToClipboard('${c.usedBy}')" title="Diklaim oleh: ${c.usedBy}">
                                <div class="absolute top-0 right-0 w-4 h-4 bg-red-500 rounded-bl-lg flex items-center justify-center"><i class="fas fa-times text-[8px] text-white"></i></div>
                                <p class="text-[10px] sm:text-xs font-bold text-red-300 mb-1 opacity-50 line-through">${c.code}</p>
                                <p class="text-[8px] text-gray-500 truncate mt-1">Oleh: ${c.usedBy.split('@')[0]}</p>
                            </div>
                            `;
                        } else {
                            return `
                            <div class="bg-emerald-900/20 border border-emerald-500/50 rounded-lg p-2 text-center relative hover:bg-emerald-800/40 transition-colors cursor-pointer group" onclick="copyToClipboard('${c.code}')">
                                <div class="absolute top-0 right-0 w-4 h-4 bg-emerald-500 rounded-bl-lg flex items-center justify-center"><i class="fas fa-check text-[8px] text-white"></i></div>
                                <p class="text-[10px] sm:text-xs font-bold text-emerald-300 mt-1">${c.code}</p>
                                <div class="absolute inset-0 bg-black/60 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                    <span class="text-[10px] font-bold text-white"><i class="fas fa-copy"></i> Salin</span>
                                </div>
                            </div>
                            `;
                        }
                    }).join('');
                } else {
                    container.innerHTML = `<div class="col-span-full text-center py-10 text-red-400 text-xs">${data.error}</div>`;
                }
            } catch (e) {
                container.innerHTML = `<div class="col-span-full text-center py-10 text-red-400 text-xs">Network Error</div>`;
            }
        }
    </script>
